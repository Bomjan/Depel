<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Carousel</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/styleMyAss.css' %}">
</head>
<body>

    <header>
        <h1>Manage Carousel</h1>
        <nav>
            <ul>
                <li><a href='/ass/dashboard/'>Back to Dashboard</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h2>Upload New Carousel Image</h2>
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="add-btn">Upload</button>
        </form>

        <h2>Existing Carousel Images</h2>
        <ul class="carousel-list">
            {% for image in images %}
                <li>
                    <img src="{{ image.image.url }}" alt="Carousel Image" width="150">
                    <form method="post" style="display:inline;">
                        {% csrf_token %}
                        <input type="hidden" name="delete_image" value="{{ image.id }}">
                        <button type="submit" class="delete-btn">Remove</button>
                    </form>
                </li>
            {% empty %}
                <p>No carousel uploaded yet.</p>
            {% endfor %}
        </ul>
    </main>

</body>
</html>
