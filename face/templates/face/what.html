<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Finance Tracker</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.0/font/bootstrap-icons.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        /* All CSS styles from the original code remain unchanged */
    </style>
</head>
<body data-theme="light">
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container-fluid">
            <button class="sidebar-toggle me-3" onclick="toggleSidebar()">
                <i class="bi bi-list"></i>
            </button>
            <a class="navbar-brand" href="#">
                <i class="bi bi-wallet2 me-2"></i>Finance Tracker
            </a>
            <div class="d-flex align-items-center">
                <button class="theme-toggle me-3" onclick="toggleTheme()">
                    <i class="bi bi-sun-fill"></i>
                </button>
                <span class="navbar-text text-white d-none d-sm-block" id="currentBalance">$0.00</span>
            </div>
        </div>
    </nav>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <nav class="sidebar-nav">
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link active" href="#" onclick="showSection('dashboard')">
                        <i class="bi bi-house"></i>Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#" onclick="showSection('transactions')">
                        <i class="bi bi-list-ul"></i>Transactions
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#" onclick="showSection('budget')">
                        <i class="bi bi-pie-chart"></i>Budget
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#" onclick="showSection('goals')">
                        <i class="bi bi-target"></i>Goals
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#" onclick="showSection('reports')">
                        <i class="bi bi-graph-up"></i>Reports
                    </a>
                </li>
            </ul>
        </nav>
    </div>

    <!-- Main Content -->
    <div class="main-content" id="mainContent" style="margin-top: 80px;">
        <!-- Dashboard Section -->
        <div id="dashboard" class="section">
            <!-- Dashboard content remains unchanged -->
        </div>

        <!-- Transactions Section -->
        <div id="transactions" class="section" style="display: none;">
            <!-- Transactions content remains unchanged -->
        </div>

        <!-- Budget Section -->
        <div id="budget" class="section" style="display: none;">
            <!-- Budget content remains unchanged -->
        </div>

        <!-- Goals Section -->
        <div id="goals" class="section" style="display: none;">
            <!-- Goals content remains unchanged -->
        </div>

        <!-- Reports Section -->
        <div id="reports" class="section" style="display: none;">
            <!-- Reports content remains unchanged -->
        </div>
    </div>

    <!-- Floating Add Button -->
    <button class="floating-add-btn" onclick="showTransactionModal()" title="Add Transaction">
        <i class="bi bi-plus"></i>
    </button>

    <!-- Add Transaction Modal -->
    <div class="modal fade" id="transactionModal" tabindex="-1">
        <!-- Modal content remains unchanged -->
    </div>

    <!-- Budget Modal -->
    <div class="modal fade" id="budgetModal" tabindex="-1">
        <!-- Modal content remains unchanged -->
    </div>

    <!-- Goal Modal -->
    <div class="modal fade" id="goalModal" tabindex="-1">
        <!-- Modal content remains unchanged -->
    </div>

    <!-- Notification Container -->
    <div id="notificationContainer"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script>
        // Data storage
        let transactions = JSON.parse(sessionStorage.getItem('transactions')) || [];
        let budgets = JSON.parse(sessionStorage.getItem('budgets')) || {};
        let goals = JSON.parse(sessionStorage.getItem('goals')) || [];
        
        // Initialize with sample data if empty
        if(transactions.length === 0) {
            transactions = [
                { id: 1, type: 'income', amount: 3500, category: 'salary', description: 'Monthly Salary', date: '2025-05-28' },
                { id: 2, type: 'expense', amount: 85.50, category: 'food', description: 'Grocery Shopping', date: '2025-05-27' },
                { id: 3, type: 'expense', amount: 45, category: 'transport', description: 'Gas Refill', date: '2025-05-26' },
                { id: 4, type: 'expense', amount: 120, category: 'utilities', description: 'Electricity Bill', date: '2025-05-25' }
            ];
            sessionStorage.setItem('transactions', JSON.stringify(transactions));
        }
        
        if(Object.keys(budgets).length === 0) {
            budgets = {
                food: { amount: 400, threshold: 80 },
                transport: { amount: 200, threshold: 85 },
                utilities: { amount: 350, threshold: 90 },
                entertainment: { amount: 150, threshold: 75 }
            };
            sessionStorage.setItem('budgets', JSON.stringify(budgets));
        }
        
        if(goals.length === 0) {
            goals = [
                { id: 1, name: 'Emergency Fund', target: 5000, current: 3200, date: '2025-12-31', category: 'emergency' },
                { id: 2, name: 'Summer Vacation', target: 3000, current: 1200, date: '2025-07-15', category: 'vacation' }
            ];
            sessionStorage.setItem('goals', JSON.stringify(goals));
        }
        
        // Categories configuration
        const expenseCategories = {
            'food': { name: 'Food & Dining', icon: 'bi-cup-straw', color: '#f59e0b' },
            'transport': { name: 'Transportation', icon: 'bi-car-front', color: '#3b82f6' },
            'entertainment': { name: 'Entertainment', icon: 'bi-film', color: '#8b5cf6' },
            'utilities': { name: 'Utilities', icon: 'bi-lightning', color: '#10b981' },
            'shopping': { name: 'Shopping', icon: 'bi-bag', color: '#ef4444' },
            'healthcare': { name: 'Healthcare', icon: 'bi-heart-pulse', color: '#6366f1' },
            'other': { name: 'Other', icon: 'bi-three-dots', color: '#6b7280' }
        };

        const incomeCategories = {
            'salary': { name: 'Salary', icon: 'bi-briefcase', color: '#10b981' },
            'freelance': { name: 'Freelance', icon: 'bi-laptop', color: '#3b82f6' },
            'investment': { name: 'Investment', icon: 'bi-graph-up', color: '#8b5cf6' },
            'gift': { name: 'Gift', icon: 'bi-gift', color: '#ec4899' },
            'other': { name: 'Other', icon: 'bi-three-dots', color: '#6b7280' }
        };
        
        const goalCategories = {
            'emergency': { name: 'Emergency Fund', icon: 'bi-shield-check', color: '#6366f1' },
            'vacation': { name: 'Vacation', icon: 'bi-airplane', color: '#f59e0b' },
            'house': { name: 'House Purchase', icon: 'bi-house', color: '#10b981' },
            'car': { name: 'Car Purchase', icon: 'bi-car-front', color: '#3b82f6' },
            'education': { name: 'Education', icon: 'bi-book', color: '#8b5cf6' },
            'retirement': { name: 'Retirement', icon: 'bi-coin', color: '#ec4899' },
            'other': { name: 'Other', icon: 'bi-three-dots', color: '#6b7280' }
        };
        
        // DOM References
        const incomeExpenseChartCtx = document.getElementById('incomeExpenseChart').getContext('2d');
        const expensePieChartCtx = document.getElementById('expensePieChart').getContext('2d');
        const monthlyTrendsChartCtx = document.getElementById('monthlyTrendsChart').getContext('2d');
        const categoryComparisonChartCtx = document.getElementById('categoryComparisonChart').getContext('2d');
        
        // Chart instances
        let incomeExpenseChart, expensePieChart, monthlyTrendsChart, categoryComparisonChart;
        
        // Initialize the application
        document.addEventListener('DOMContentLoaded', function() {
            // Initialize modals
            const modalTriggers = document.querySelectorAll('[data-bs-toggle="modal"]');
            modalTriggers.forEach(trigger => {
                trigger.addEventListener('click', function() {
                    const modalId = this.getAttribute('data-bs-target');
                    const modal = new bootstrap.Modal(document.querySelector(modalId));
                    modal.show();
                });
            });
            
            // Set current date as default in forms
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('transactionDate').value = today;
            document.getElementById('goalDate').valueAsDate = new Date(new Date().setMonth(new Date().getMonth() + 6));
            
            // Initialize category dropdowns
            updateCategoryOptions();
            
            // Load data and render UI
            updateDashboard();
            renderTransactions();
            renderBudgets();
            renderGoals();
            
            // Set initial balance
            updateBalance();
        });
        
        // Toggle sidebar visibility
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const mainContent = document.getElementById('mainContent');
            
            sidebar.classList.toggle('show');
            mainContent.classList.toggle('sidebar-open');
        }
        
        // Toggle between light/dark theme
        function toggleTheme() {
            const themeToggle = document.querySelector('.theme-toggle');
            const currentTheme = document.body.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            
            document.body.setAttribute('data-theme', newTheme);
            themeToggle.innerHTML = newTheme === 'light' ? '<i class="bi bi-moon-fill"></i>' : '<i class="bi bi-sun-fill"></i>';
            
            // Re-render charts to update their styles
            renderCharts();
        }
        
        // Show the selected section
        function showSection(sectionId) {
            // Hide all sections
            document.querySelectorAll('.section').forEach(section => {
                section.style.display = 'none';
            });
            
            // Show the selected section
            document.getElementById(sectionId).style.display = 'block';
            
            // Update active nav link
            document.querySelectorAll('.sidebar-nav .nav-link').forEach(link => {
                link.classList.remove('active');
            });
            document.querySelector(`.sidebar-nav .nav-link[onclick="showSection('${sectionId}')"]`).classList.add('active');
            
            // Close sidebar on mobile
            if (window.innerWidth < 768) {
                toggleSidebar();
            }
            
            // Update section-specific content
            if(sectionId === 'reports') {
                renderReports();
            }
        }
        
        // Update category options in dropdown based on transaction type
        function updateCategoryOptions() {
            const type = document.getElementById('transactionType').value;
            const categorySelect = document.getElementById('transactionCategory');
            
            // Clear existing options
            categorySelect.innerHTML = '';
            
            // Add new options based on type
            const categories = type === 'income' ? incomeCategories : expenseCategories;
            for (const [key, category] of Object.entries(categories)) {
                const option = document.createElement('option');
                option.value = key;
                option.textContent = category.name;
                categorySelect.appendChild(option);
            }
        }
        
        // Show transaction modal
        function showTransactionModal() {
            const modal = new bootstrap.Modal(document.getElementById('transactionModal'));
            modal.show();
        }
        
        // Add a new transaction
        function addTransaction() {
            const type = document.getElementById('transactionType').value;
            const amount = parseFloat(document.getElementById('transactionAmount').value);
            const category = document.getElementById('transactionCategory').value;
            const description = document.getElementById('transactionDescription').value;
            const date = document.getElementById('transactionDate').value;
            
            if (!amount || !description || !date) {
                showNotification('Please fill in all fields', 'danger');
                return;
            }
            
            const newTransaction = {
                id: Date.now(),
                type,
                amount,
                category,
                description,
                date
            };
            
            transactions.push(newTransaction);
            sessionStorage.setItem('transactions', JSON.stringify(transactions));
            
            // Close modal and reset form
            const modal = bootstrap.Modal.getInstance(document.getElementById('transactionModal'));
            modal.hide();
            document.getElementById('transactionForm').reset();
            
            // Update UI
            updateDashboard();
            renderTransactions();
            updateBalance();
            
            showNotification('Transaction added successfully!', 'success');
        }
        
        // Show budget modal
        function showBudgetModal() {
            const modal = new bootstrap.Modal(document.getElementById('budgetModal'));
            modal.show();
        }
        
        // Set a new budget
        function setBudget() {
            const category = document.getElementById('budgetCategory').value;
            const amount = parseFloat(document.getElementById('budgetAmount').value);
            const threshold = parseInt(document.getElementById('budgetThreshold').value);
            
            if (!amount) {
                showNotification('Please enter a budget amount', 'danger');
                return;
            }
            
            budgets[category] = { amount, threshold };
            sessionStorage.setItem('budgets', JSON.stringify(budgets));
            
            // Close modal and reset form
            const modal = bootstrap.Modal.getInstance(document.getElementById('budgetModal'));
            modal.hide();
            document.getElementById('budgetForm').reset();
            
            // Update UI
            renderBudgets();
            
            showNotification('Budget set successfully!', 'success');
        }
        
        // Show goal modal
        function showGoalModal() {
            const modal = new bootstrap.Modal(document.getElementById('goalModal'));
            modal.show();
        }
        
        // Add a new goal
        function addGoal() {
            const name = document.getElementById('goalName').value;
            const target = parseFloat(document.getElementById('goalTarget').value);
            const current = parseFloat(document.getElementById('goalCurrent').value);
            const date = document.getElementById('goalDate').value;
            const category = document.getElementById('goalCategory').value;
            
            if (!name || !target || !date) {
                showNotification('Please fill in all required fields', 'danger');
                return;
            }
            
            const newGoal = {
                id: Date.now(),
                name,
                target,
                current,
                date,
                category
            };
            
            goals.push(newGoal);
            sessionStorage.setItem('goals', JSON.stringify(goals));
            
            // Close modal and reset form
            const modal = bootstrap.Modal.getInstance(document.getElementById('goalModal'));
            modal.hide();
            document.getElementById('goalForm').reset();
            
            // Update UI
            renderGoals();
            
            showNotification('Goal added successfully!', 'success');
        }
        
        // Update dashboard with current data
        function updateDashboard() {
            // Calculate financial metrics
            const timeFilter = parseInt(document.getElementById('timeFilter').value);
            const filteredTransactions = filterTransactionsByDate(timeFilter);
            
            const income = filteredTransactions
                .filter(t => t.type === 'income')
                .reduce((sum, t) => sum + t.amount, 0);
            
            const expenses = filteredTransactions
                .filter(t => t.type === 'expense')
                .reduce((sum, t) => sum + t.amount, 0);
            
            const balance = income - expenses;
            const savingsRate = income > 0 ? Math.round((balance / income) * 100) : 0;
            
            // Update UI elements
            document.getElementById('totalIncome').textContent = `$${income.toFixed(2)}`;
            document.getElementById('totalExpenses').textContent = `$${expenses.toFixed(2)}`;
            document.getElementById('netBalance').textContent = `$${balance.toFixed(2)}`;
            document.getElementById('savingsRate').textContent = `${savingsRate}%`;
            
            // Add random changes for demo purposes
            document.getElementById('incomeChange').textContent = `+${Math.floor(Math.random() * 15) + 5}%`;
            document.getElementById('expenseChange').textContent = `+${Math.floor(Math.random() * 10) + 2}%`;
            document.getElementById('balanceChange').textContent = `${balance > 0 ? '+' : ''}${Math.floor(Math.random() * 20) - 5}%`;
            document.getElementById('savingsChange').textContent = `${savingsRate > 0 ? '+' : ''}${Math.floor(Math.random() * 15) - 5}%`;
            
            // Update charts
            renderCharts();
            
            // Render recent transactions
            renderRecentTransactions();
        }
        
        // Render all charts
        function renderCharts() {
            // Destroy existing charts if they exist
            if (incomeExpenseChart) incomeExpenseChart.destroy();
            if (expensePieChart) expensePieChart.destroy();
            
            // Render Income vs Expenses chart
            renderIncomeExpenseChart();
            
            // Render Expense Categories chart
            renderExpensePieChart();
        }
        
        // Render Income vs Expenses chart
        function renderIncomeExpenseChart() {
            // Sample data for the chart
            const labels = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
            const incomeData = [3200, 3400, 3600, 3800, 4000, 4200, 4400, 4600, 4800, 5000, 5200, 5400];
            const expenseData = [2800, 2900, 3100, 3300, 3500, 3700, 3900, 4100, 4300, 4500, 4700, 4900];
            
            incomeExpenseChart = new Chart(incomeExpenseChartCtx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'Income',
                            data: incomeData,
                            borderColor: '#10b981',
                            backgroundColor: 'rgba(16, 185, 129, 0.1)',
                            tension: 0.3,
                            fill: true
                        },
                        {
                            label: 'Expenses',
                            data: expenseData,
                            borderColor: '#ef4444',
                            backgroundColor: 'rgba(239, 68, 68, 0.1)',
                            tension: 0.3,
                            fill: true
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'top',
                            labels: {
                                color: 'var(--text-color)'
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: {
                                color: 'rgba(0, 0, 0, 0.05)'
                            },
                            ticks: {
                                color: 'var(--text-color)'
                            }
                        },
                        y: {
                            beginAtZero: true,
                            grid: {
                                color: 'rgba(0, 0, 0, 0.05)'
                            },
                            ticks: {
                                color: 'var(--text-color)',
                                callback: function(value) {
                                    return '$' + value;
                                }
                            }
                        }
                    }
                }
            });
        }
        
        // Render Expense Categories pie chart
        function renderExpensePieChart() {
            // Calculate expense distribution
            const expenseDistribution = {
                food: 1200,
                transport: 800,
                entertainment: 600,
                utilities: 900,
                shopping: 700,
                healthcare: 400,
                other: 300
            };
            
            // Prepare data for chart
            const labels = Object.keys(expenseDistribution).map(key => expenseCategories[key].name);
            const data = Object.values(expenseDistribution);
            const backgroundColors = Object.keys(expenseDistribution).map(key => expenseCategories[key].color);
            
            expensePieChart = new Chart(expensePieChartCtx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: data,
                        backgroundColor: backgroundColors,
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'right',
                            labels: {
                                color: 'var(--text-color)',
                                padding: 20,
                                boxWidth: 15
                            }
                        }
                    },
                    cutout: '60%'
                }
            });
            
            // Render legend
            const legendContainer = document.createElement('div');
            legendContainer.className = 'expense-pie-legend';
            
            labels.forEach((label, index) => {
                const legendItem = document.createElement('div');
                legendItem.className = 'legend-item';
                
                const colorBox = document.createElement('div');
                colorBox.className = 'legend-color';
                colorBox.style.backgroundColor = backgroundColors[index];
                
                const labelText = document.createElement('span');
                labelText.textContent = label;
                labelText.style.color = 'var(--text-color)';
                
                legendItem.appendChild(colorBox);
                legendItem.appendChild(labelText);
                legendContainer.appendChild(legendItem);
            });
            
            // Add legend to chart container
            const chartContainer = document.querySelector('#expensePieChart').parentElement;
            const existingLegend = chartContainer.querySelector('.expense-pie-legend');
            if (existingLegend) existingLegend.remove();
            chartContainer.appendChild(legendContainer);
        }
        
        // Render recent transactions
        function renderRecentTransactions() {
            const container = document.getElementById('recentTransactions');
            container.innerHTML = '';
            
            // Sort transactions by date (newest first)
            const sortedTransactions = [...transactions].sort((a, b) => 
                new Date(b.date) - new Date(a.date)
            ).slice(0, 5); // Get only the 5 most recent
            
            if (sortedTransactions.length === 0) {
                container.innerHTML = '<div class="text-center py-4">No recent transactions</div>';
                return;
            }
            
            sortedTransactions.forEach(transaction => {
                const category = transaction.type === 'income' ? 
                    incomeCategories[transaction.category] : 
                    expenseCategories[transaction.category];
                
                const transactionEl = document.createElement('div');
                transactionEl.className = 'transaction-item';
                transactionEl.innerHTML = `
                    <div class="d-flex align-items-center">
                        <div class="transaction-icon ${transaction.type === 'income' ? 'category-salary' : 'category-' + transaction.category}">
                            <i class="bi ${category.icon}"></i>
                        </div>
                        <div class="ms-3">
                            <h6 class="mb-0">${transaction.description}</h6>
                            <small class="text-muted">${category.name} • ${formatDate(transaction.date)}</small>
                        </div>
                    </div>
                    <div class="text-end">
                        <h5 class="mb-0 ${transaction.type === 'income' ? 'text-success' : 'text-danger'}">
                            ${transaction.type === 'income' ? '+' : '-'}$${transaction.amount.toFixed(2)}
                        </h5>
                    </div>
                `;
                
                container.appendChild(transactionEl);
            });
        }
        
        // Render all transactions
        function renderTransactions() {
            const container = document.getElementById('transactionsList');
            container.innerHTML = '';
            
            if (transactions.length === 0) {
                container.innerHTML = '<div class="text-center py-4">No transactions yet</div>';
                return;
            }
            
            // Sort transactions by date (newest first)
            const sortedTransactions = [...transactions].sort((a, b) => 
                new Date(b.date) - new Date(a.date)
            );
            
            sortedTransactions.forEach(transaction => {
                const category = transaction.type === 'income' ? 
                    incomeCategories[transaction.category] : 
                    expenseCategories[transaction.category];
                
                const transactionEl = document.createElement('div');
                transactionEl.className = 'transaction-item';
                transactionEl.innerHTML = `
                    <div class="d-flex align-items-center">
                        <div class="transaction-icon ${transaction.type === 'income' ? 'category-salary' : 'category-' + transaction.category}">
                            <i class="bi ${category.icon}"></i>
                        </div>
                        <div class="ms-3">
                            <h6 class="mb-0">${transaction.description}</h6>
                            <small class="text-muted">${category.name} • ${formatDate(transaction.date)}</small>
                        </div>
                    </div>
                    <div class="text-end">
                        <h5 class="mb-0 ${transaction.type === 'income' ? 'text-success' : 'text-danger'}">
                            ${transaction.type === 'income' ? '+' : '-'}$${transaction.amount.toFixed(2)}
                        </h5>
                        <div class="d-flex gap-2 mt-2 justify-content-end">
                            <button class="btn btn-sm btn-outline-secondary">Edit</button>
                            <button class="btn btn-sm btn-outline-danger">Delete</button>
                        </div>
                    </div>
                `;
                
                container.appendChild(transactionEl);
            });
        }
        
        // Render budgets
        function renderBudgets() {
            const container = document.getElementById('budgetList');
            container.innerHTML = '';
            
            if (Object.keys(budgets).length === 0) {
                container.innerHTML = '<div class="text-center py-4">No budgets set yet</div>';
                return;
            }
            
            for (const [category, budget] of Object.entries(budgets)) {
                const categoryInfo = expenseCategories[category];
                const spent = Math.floor(Math.random() * (budget.amount * 1.2)); // Random spent amount for demo
                const percentage = Math.min(100, (spent / budget.amount) * 100);
                
                const budgetEl = document.createElement('div');
                budgetEl.className = 'stat-card mb-3';
                budgetEl.innerHTML = `
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <div class="d-flex align-items-center">
                            <div class="transaction-icon category-${category} me-3">
                                <i class="bi ${categoryInfo.icon}"></i>
                            </div>
                            <div>
                                <h5 class="mb-0">${categoryInfo.name}</h5>
                                <small class="text-muted">Budget: $${budget.amount.toFixed(2)}</small>
                            </div>
                        </div>
                        <div class="text-end">
                            <h4 class="mb-0">$${spent.toFixed(2)}</h4>
                            <small class="${percentage < budget.threshold ? 'text-success' : percentage < 100 ? 'text-warning' : 'text-danger'}">
                                ${percentage.toFixed(1)}%
                            </small>
                        </div>
                    </div>
                    <div class="budget-progress">
                        <div class="budget-progress-bar ${percentage < budget.threshold ? 'progress-safe' : percentage < 100 ? 'progress-warning' : 'progress-danger'}" 
                             style="width: ${percentage}%"></div>
                    </div>
                    <div class="d-flex justify-content-between mt-2">
                        <small>0%</small>
                        <small>${budget.threshold}%</small>
                        <small>100%</small>
                    </div>
                `;
                
                container.appendChild(budgetEl);
            }
        }
        
        // Render goals
        function renderGoals() {
            const container = document.getElementById('goalsList');
            container.innerHTML = '';
            
            if (goals.length === 0) {
                container.innerHTML = '<div class="text-center py-4">No goals set yet</div>';
                return;
            }
            
            goals.forEach(goal => {
                const categoryInfo = goalCategories[goal.category];
                const percentage = Math.min(100, (goal.current / goal.target) * 100);
                const daysLeft = Math.ceil((new Date(goal.date) - new Date()) / (1000 * 60 * 60 * 24));
                
                const goalEl = document.createElement('div');
                goalEl.className = 'goal-card';
                goalEl.innerHTML = `
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <div class="d-flex align-items-center">
                            <div class="transaction-icon" style="background: ${categoryInfo.color}">
                                <i class="bi ${categoryInfo.icon}"></i>
                            </div>
                            <div class="ms-3">
                                <h5 class="mb-0">${goal.name}</h5>
                                <small class="text-muted">${categoryInfo.name}</small>
                            </div>
                        </div>
                        <div class="text-end">
                            <h4 class="mb-0">$${goal.current.toFixed(2)}</h4>
                            <small class="text-muted">of $${goal.target.toFixed(2)}</small>
                        </div>
                    </div>
                    <div class="goal-progress">
                        <div class="goal-progress-bar" style="width: ${percentage}%"></div>
                    </div>
                    <div class="d-flex justify-content-between mt-3">
                        <div>
                            <small>${percentage.toFixed(1)}%</small>
                        </div>
                        <div>
                            <small>${daysLeft} days left</small>
                        </div>
                    </div>
                `;
                
                container.appendChild(goalEl);
            });
        }
        
        // Render reports section
        function renderReports() {
            // Destroy existing charts if they exist
            if (monthlyTrendsChart) monthlyTrendsChart.destroy();
            if (categoryComparisonChart) categoryComparisonChart.destroy();
            
            // Render Monthly Trends chart
            renderMonthlyTrendsChart();
            
            // Render Category Comparison chart
            renderCategoryComparisonChart();
        }
        
        // Render Monthly Trends chart
        function renderMonthlyTrendsChart() {
            // Sample data for the chart
            const labels = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul'];
            const incomeData = [3200, 3400, 3600, 3800, 4000, 4200, 4400];
            const expenseData = [2800, 2900, 3100, 3300, 3500, 3700, 3900];
            const savingsData = incomeData.map((income, i) => income - expenseData[i]);
            
            monthlyTrendsChart = new Chart(monthlyTrendsChartCtx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'Income',
                            data: incomeData,
                            backgroundColor: '#10b981',
                            borderRadius: 6
                        },
                        {
                            label: 'Expenses',
                            data: expenseData,
                            backgroundColor: '#ef4444',
                            borderRadius: 6
                        },
                        {
                            label: 'Savings',
                            data: savingsData,
                            backgroundColor: '#3b82f6',
                            borderRadius: 6
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'top',
                            labels: {
                                color: 'var(--text-color)'
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: {
                                color: 'rgba(0, 0, 0, 0.05)'
                            },
                            ticks: {
                                color: 'var(--text-color)'
                            },
                            stacked: false
                        },
                        y: {
                            beginAtZero: true,
                            grid: {
                                color: 'rgba(0, 0, 0, 0.05)'
                            },
                            ticks: {
                                color: 'var(--text-color)',
                                callback: function(value) {
                                    return '$' + value;
                                }
                            }
                        }
                    }
                }
            });
        }
        
        // Render Category Comparison chart
        function renderCategoryComparisonChart() {
            // Sample data for the chart
            const categories = ['Food', 'Transport', 'Entertainment', 'Utilities', 'Shopping'];
            const thisMonth = [850, 420, 320, 680, 540];
            const lastMonth = [780, 450, 380, 640, 490];
            
            categoryComparisonChart = new Chart(categoryComparisonChartCtx, {
                type: 'radar',
                data: {
                    labels: categories,
                    datasets: [
                        {
                            label: 'This Month',
                            data: thisMonth,
                            backgroundColor: 'rgba(59, 130, 246, 0.2)',
                            borderColor: '#3b82f6',
                            pointBackgroundColor: '#3b82f6',
                            pointBorderColor: '#fff',
                            pointHoverBackgroundColor: '#fff',
                            pointHoverBorderColor: '#3b82f6'
                        },
                        {
                            label: 'Last Month',
                            data: lastMonth,
                            backgroundColor: 'rgba(139, 92, 246, 0.2)',
                            borderColor: '#8b5cf6',
                            pointBackgroundColor: '#8b5cf6',
                            pointBorderColor: '#fff',
                            pointHoverBackgroundColor: '#fff',
                            pointHoverBorderColor: '#8b5cf6'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'top',
                            labels: {
                                color: 'var(--text-color)'
                            }
                        }
                    },
                    scales: {
                        r: {
                            grid: {
                                color: 'rgba(0, 0, 0, 0.1)'
                            },
                            angleLines: {
                                color: 'rgba(0, 0, 0, 0.1)'
                            },
                            pointLabels: {
                                color: 'var(--text-color)'
                            },
                            ticks: {
                                color: 'var(--text-color)',
                                backdropColor: 'transparent'
                            }
                        }
                    }
                }
            });
        }
        
        // Update current balance display
        function updateBalance() {
            const income = transactions
                .filter(t => t.type === 'income')
                .reduce((sum, t) => sum + t.amount, 0);
            
            const expenses = transactions
                .filter(t => t.type === 'expense')
                .reduce((sum, t) => sum + t.amount, 0);
            
            const balance = income - expenses;
            document.getElementById('currentBalance').textContent = `$${balance.toFixed(2)}`;
        }
        
        // Filter transactions by date
        function filterTransactionsByDate(days) {
            const today = new Date();
            const startDate = new Date(today);
            startDate.setDate(today.getDate() - days);
            
            return transactions.filter(transaction => {
                const transactionDate = new Date(transaction.date);
                return transactionDate >= startDate && transactionDate <= today;
            });
        }
        
        // Filter transactions by type and search term
        function filterTransactions() {
            const typeFilter = document.getElementById('transactionFilter').value;
            const searchTerm = document.getElementById('transactionSearch').value.toLowerCase();
            
            let filtered = transactions;
            
            // Apply type filter
            if (typeFilter !== 'all') {
                filtered = filtered.filter(transaction => transaction.type === typeFilter);
            }
            
            // Apply search filter
            if (searchTerm) {
                filtered = filtered.filter(transaction => 
                    transaction.description.toLowerCase().includes(searchTerm) ||
                    (transaction.type === 'income' ? 
                        incomeCategories[transaction.category].name.toLowerCase() : 
                        expenseCategories[transaction.category].name.toLowerCase()
                    ).includes(searchTerm)
                );
            }
            
            // Render filtered transactions
            renderFilteredTransactions(filtered);
        }
        
        // Render filtered transactions
        function renderFilteredTransactions(filteredTransactions) {
            const container = document.getElementById('transactionsList');
            container.innerHTML = '';
            
            if (filteredTransactions.length === 0) {
                container.innerHTML = '<div class="text-center py-4">No matching transactions</div>';
                return;
            }
            
            // Sort by date (newest first)
            const sortedTransactions = [...filteredTransactions].sort((a, b) => 
                new Date(b.date) - new Date(a.date)
            );
            
            sortedTransactions.forEach(transaction => {
                const category = transaction.type === 'income' ? 
                    incomeCategories[transaction.category] : 
                    expenseCategories[transaction.category];
                
                const transactionEl = document.createElement('div');
                transactionEl.className = 'transaction-item';
                transactionEl.innerHTML = `
                    <div class="d-flex align-items-center">
                        <div class="transaction-icon ${transaction.type === 'income' ? 'category-salary' : 'category-' + transaction.category}">
                            <i class="bi ${category.icon}"></i>
                        </div>
                        <div class="ms-3">
                            <h6 class="mb-0">${transaction.description}</h6>
                            <small class="text-muted">${category.name} • ${formatDate(transaction.date)}</small>
                        </div>
                    </div>
                    <div class="text-end">
                        <h5 class="mb-0 ${transaction.type === 'income' ? 'text-success' : 'text-danger'}">
                            ${transaction.type === 'income' ? '+' : '-'}$${transaction.amount.toFixed(2)}
                        </h5>
                        <div class="d-flex gap-2 mt-2 justify-content-end">
                            <button class="btn btn-sm btn-outline-secondary">Edit</button>
                            <button class="btn btn-sm btn-outline-danger">Delete</button>
                        </div>
                    </div>
                `;
                
                container.appendChild(transactionEl);
            });
        }
        
        // Show notification
        function showNotification(message, type) {
            const container = document.getElementById('notificationContainer');
            
            const notification = document.createElement('div');
            notification.className = `notification alert alert-${type} alert-dismissible fade show`;
            notification.innerHTML = `
                <strong>${type === 'success' ? 'Success!' : 'Error!'}</strong> ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            `;
            
            container.appendChild(notification);
            
            // Auto remove after 3 seconds
            setTimeout(() => {
                notification.classList.remove('show');
                setTimeout(() => {
                    notification.remove();
                }, 300);
            }, 3000);
        }
        
        // Format date as MM/DD/YYYY
        function formatDate(dateString) {
            const date = new Date(dateString);
            return `${date.getMonth() + 1}/${date.getDate()}/${date.getFullYear()}`;
        }
    </script>
</body>
</html>
