{% extends 'base.html' %}
{% load static%}
{% block content%}
    <style>
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 4fr));
            gap: 2rem;
            padding: 2rem;
        }
        .video-card {
            border: 1px solid #ccc;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            background: #fff;
        }
        video {
            width: 100%;
            height: auto;
        }
        .video-content {
            padding: 1rem;
        }
        h1 {
            text-align: center;
            margin: 2rem 0;
        }
    </style>
</head>
<body>
<div class="pusher" style="width: 100%; height: 120px;">

</div>

<h1>Testing Productivity of Different Paddy Threshers</h1>

<div class="video-grid">
    {% for video in videos %}
        <div class="video-card">
            <video controls>
                <source src="{{ video.video.url }}" type="video/mp4">
                Your browser does not support the video tag.
            </video>
            <div class="video-content">
                <h3>{{ video.title }}</h3>
                <p>{{ video.description }}</p>
            </div>
        </div>
    {% endfor %}
</div>

</body>
{% endblock %}
